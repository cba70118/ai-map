  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return new TextDecoder().decode(pt);
}
function open(html){ document.open(); document.write(html); document.close(); }
async function tryUnlock(pw,remember){
  const html=await unlock(pw); if(remember) sessionStorage.setItem('map_pw',pw); open(html);
}
document.getElementById('g').addEventListener('submit',async ev=>{
  ev.preventDefault(); const b=document.getElementById('b'), e=document.getElementById('e');
  b.disabled=true; e.textContent='';
  try{ await tryUnlock(document.getElementById('pw').value,true); }
  catch(_){ e.textContent='Incorrect password'; b.disabled=false; document.getElementById('pw').select(); }
});
// auto-unlock within the same browser session
(async()=>{ const s=sessionStorage.getItem('map_pw'); if(s){ try{ await tryUnlock(s,false); }catch(_){ sessionStorage.removeItem('map_pw'); } } })();
</script>
